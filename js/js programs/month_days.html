<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
          let n=parseInt(prompt("Enter the Case No:"));

        switch(n){

            case 1:document.writeln("January")
            document.writeln("<br>31 Days")
            break;
            case 2:document.writeln("February")
            document.writeln("<br>28 or 29 Days")
            break;
            case 3:document.writeln("March")
            document.writeln("<br>31 Days")
            break;
            case 4:document.writeln("April")
            document.writeln("<br>30 Days")
            break;
            case 5:document.writeln("May")
            document.writeln("<br>31 Days")
            break;
            case 6:document.writeln("June")
            document.writeln("<br>30 Days")
            break;
            case 7:document.writeln("July")
            document.writeln("<br>31 Days")
            break;
            case 8:document.writeln("August")
            document.writeln("<br>31 Days")
            break;
            case 9:document.writeln("September")
            document.writeln("<br>30 Days")
            break;
            case 10:document.writeln("Octomber")
            document.writeln("<br>31 Days")
            break;
            case 11:document.writeln("November")
            document.writeln("<br>30 Days")
            break;
            case 12:document.writeln("December")
            document.writeln("<br>31 Days")
            break;
        }
    </script>
</body>
</html>
