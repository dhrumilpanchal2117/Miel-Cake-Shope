<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center">Sum Of Arry</h1>
    <script>
         let ary=[];
        let n=parseInt(prompt("Enter the Value:"));

        for(let i=0;i<n;i++){
            ary[i]=parseInt(prompt());
        }
        for(i=0;i<n;i++){
            document.writeln("<br>ary[",i,"]=",ary[i])
        }
        sum=0
        for(i=0;i<n;i++){
            sum+=ary[i];
        }
        document.writeln("<br>Sum Of Arry:",sum)
    </script>
</body>
</html>
