<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter the A:"));

        if(a>=0){
            if(a==0){
                document.writeln("Zero Value")  
            }
            else{
                document.writeln("Positive Value")  
            }
        }
        else{
            document.writeln("Negative Value")
        }
                
    </script>
</body>
</html>
