<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Onpress Event</h1>
    <input type="text" onfocus="myfun()" id="txbox">
    <script>
        function myfun(){
            document.getElementById("txbox").style.background="black";
        }
    </script>
</body>
</html>
