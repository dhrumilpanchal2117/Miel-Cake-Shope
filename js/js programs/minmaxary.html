<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center">Min Max Arry</h1>
    <script>
         let ary=[];
        let n=parseInt(prompt("Enter the Value:"));

        for(let i=0;i<n;i++){
            ary[i]=parseInt(prompt());
        }
        for(i=0;i<n;i++){
            document.writeln("<br>ary[",i,"]=",ary[i])
        }
        max=0;
        min=0;
        for(i=0;i<n;i++){
            if(ary[i]>max){
                max=ary[i]
            }
            if(ary[i]<min){
                min=ary[i]
            }
        }
        document.writeln("<br>Max No Of Arry:",max)
        document.writeln("<br>Min No Of Arry:",min)
    </script>
</body>
</html>
