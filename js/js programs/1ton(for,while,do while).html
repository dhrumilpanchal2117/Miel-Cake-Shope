<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let cas = parseInt(prompt("Enter the Case:"));
        let n = parseInt(prompt("Enter the Number:"));
        switch (cas) {
            case 1:
                 document.writeln("Case 1 for loop")
                for (i = 1; i <= n; i++) {
                    document.writeln("<br>", i)
                }
                break;
            case 2:
                document.writeln("<br>Case 2 While loop")
                i = 1
                while (i - 1 != n) {
                    document.writeln("<br>", i)
                    i++
                }
                break;
            case 3:
                     document.writeln("<br>Case 3 Do while")
                i = 1
                do {
                    document.writeln("<br>", i)
                    i++
                } while (i - 1 != n)
                break;
        }
    </script>
</body>

</html>
