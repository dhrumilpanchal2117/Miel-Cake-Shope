<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter the A:"));
        let b=parseInt(prompt("Enter the B:"));
        let c=parseInt(prompt("Enter the C:"));
        let d=parseInt(prompt("Enter the D:"));

        if(a>=b){
            if(a>=c){
                if(a>=d){
                    document.writeln("<br><br>A is Max:",a)
                }
            }
        }
        if(a<=b){
            if(a<=c){
                if(a<=d){
                    document.writeln("<br><br>A is Min:",a)
                }
            }
        }
        if(b>=a){
            if(b>=c){
                if(b>=d){
                    document.writeln("<br><br>B is Max:",b)  
                }
            }
        }
        if(b<=a){
            if(b<=c){
                if(b<=d){
                    document.writeln("<br><br>B is Min:",b)
                }
            }
        }
        if(c>=a){
            if(c>=b){
                if(c>=d){
                    document.writeln("<br><br>C is Max:",c)
                }
            }
        }
        if(c<=a){
            if(c<=b){
                if(c<=d){
                    document.writeln("<br><br>C is Min:",c)
                }
            }
        }
        if(d>=a){
            if(d>=b){
                if(d>=c){
                    document.writeln("<br><br>D is Max:",d)
                }
            }
        }
        if(d<=a){
            if(d<=b){
                if(d<=c){
                    document.writeln("<br><br>D is Min:",d)
                }
            }
        }
    </script>
</body>
</html>
