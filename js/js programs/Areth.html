<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter the Value Of A:"));
        let b=parseInt(prompt("Enter the Value Of B:"));

        document.writeln("Addition Of Digit:",a+b)
        document.writeln("<br><br>Substraction Of Digit:",a-b)
        document.writeln("<br><br>Multiplication Of Digit:",a*b)
        document.writeln("<br><br>Division Of Digit:",a/b)
        document.writeln("<br><br>Module Of Digit:",a%b)
    </script>
</body>
</html>
