<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const pi=3.1416
        let radi=parseFloat(prompt("Enter the Value of Radius:"));
        let len=parseFloat(prompt("Enter the Value of Length:"));
        let base=parseFloat(prompt("Enter the Value of Base:"));
        let side=parseFloat(prompt("Enter the Value of Side:"));

        document.writeln("Area Of Circle:",pi*radi*radi)
        document.writeln("<br><br>Area Of Circumference:",2*pi*radi)
        document.writeln("<br><br>Area Of Rectangle:",len*base)
        document.writeln("<br><br>Area Of Square:",side*side)
    </script>
</body>
</html>
