<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter the Value :"));

        if(n%2==0){
            document.writeln("Even Number:",n)
        }
        else{
            document.writeln("<br>Odd Number:",n)
        }
    </script>
</body>
</html>
