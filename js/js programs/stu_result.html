<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let mathes = parseInt(prompt("Enter the marks of maths"));
        let guj = parseInt(prompt("Enter the marks of gujrati"));
        let eng = parseInt(prompt("Enter the marks of english"));
        let sci = parseInt(prompt("Enter the marks of science"));
        let hin = parseInt(prompt("Enter the marks of hindi"));

        parseInt(ttl = mathes + guj + eng + sci + hin)
        parseFloat(per = ttl / 5)

        document.writeln("MATHES:", mathes);
        document.writeln("<br><br>GUJARATI:", guj);
        document.writeln("<br><br>ENGLISH:", eng);
        document.writeln("<br><br>SCIENCE:", sci);
        document.writeln("<br><br>HINDI:", hin);
        document.writeln("<br><br>TOTAL:", ttl);
        document.writeln("<br><br>PERCENTAGE:", per);
    </script>
</body>

</html>
