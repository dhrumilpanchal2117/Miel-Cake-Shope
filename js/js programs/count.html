<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter the Value:"));
        sum=0
        count=0
        while(n!=0){
            sum+=n
            n=parseInt(n/10)
            count++
        }  
        document.writeln("<br>Count Of Number:",count)
    </script>
</body>
</html>
