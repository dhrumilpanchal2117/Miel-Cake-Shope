<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Onkeyup Event</h1>
    <input type="text" onkeyup="myfun()" id="txbox">
    <script>
        function myfun(){
            var x=document.getElementById("txbox");
            x.value=x.value.toUpperCase();
        }
    </script>
</body>
</html>
