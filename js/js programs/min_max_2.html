<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter the A:"));
        let b=parseInt(prompt("Enter the B:"));

        if(a>=b){
            document.writeln("A is Max:",a)
            document.writeln("<br>Creative")
        }
        else{
            document.writeln("<br><br>B is Max:",b)
            document.writeln("<br>Creative")
        }
        if(a<=b){
            document.writeln("<br><br>A is Min:",a)
            document.writeln("<br>Multimedia")
        }
        else{
            document.writeln("<br><br>B is Min:",b)
            document.writeln("<br>Multimedia")
        }
    </script>
</body>
</html>
