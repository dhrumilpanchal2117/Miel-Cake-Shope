<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter the Case No:"));

        switch(n){

            case 1:document.writeln("Sunday")
            break;
            case 2:document.writeln("Monday")
            break;
            case 3:document.writeln("Tuesday")
            break;
            case 4:document.writeln("Wednesday")
            break;
            case 5:document.writeln("Thursday")
            break;
            case 6:document.writeln("Friday")
            break;
            case 7:document.writeln("Saturday")
            break;
        }
    </script>
</body>
</html>
