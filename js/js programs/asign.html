<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter the Value Of A:"));
        let b=parseInt(prompt("Enter the Value Of B:"));
        sum=parseInt(a+b)
        sub=parseInt(a-b)
        multi=parseFloat(a*b)
        divi=parseFloat(a/b)
        mod=parseFloat(a%b)
        document.writeln("Addition Of Digit:",sum)
        document.writeln("<br><br>Substraction Of Digit:",sub)
        document.writeln("<br><br>Multiplication Of Digit:",multi)
        document.writeln("<br><br>Division Of Digit:",divi)
        document.writeln("<br><br>Module Of Digit:",mod)
    </script>
</body>
</html>
