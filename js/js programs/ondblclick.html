<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>OndblClick(Double Click)</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempora veniam quia quis nisi eos porro rem laborum voluptatem, dignissimos accusantium. Voluptatem, ea dolor ipsam rerum dicta inventore laboriosam iste! Iste.</p>
    <button ondblclick="myfun()">Click Me</button>
    <p id="demo"></p>
    <script>
        function myfun(){
            document.getElementById("demo").innerHTML="Hello World";
        }
    </script>
</body>
</html>
