<!DOCTYPE html>

    <title>Document</title>
</head>
<body>
    <h1 align="center">Display Arry With Position</h1>
    <script>
        let ary=[];
        let n=parseInt(prompt("Enter the Value:"));

        for(let i=0;i<n;i++){
            ary[i]=parseInt(prompt());
        }
        for(i=0;i<n;i++){
            document.writeln("<br>ary[",i,"]=",ary[i])
        }
        // ary.forEach(Element =>{

    </script>
</body>
