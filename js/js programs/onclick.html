<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Onclick Event</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Voluptates ea nemo illo, nostrum repudiandae pariatur doloremque. Repellendus corrupti ullam neque explicabo nesciunt illo, voluptatem alias natus, quam harum veritatis magnam.</p>
    <button onclick="myfun()">Click Me</button>
    <p id="demo"></p>
    <script>
        function myfun(){
            document.getElementById("demo").innerHTML="Hello World";
        }
    </script>
</body>
</html>
